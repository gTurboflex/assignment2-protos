name: Remote Proto Generation

on:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Protos Repo
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21' 

      - name: Install and Generate
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          
          #: создаем папку payment внутри gen/go
          mkdir -p ./gen/go/payment
          
          # Указываем путь до этой папки в --go_out и --go-grpc_out
          protoc --go_out=./gen/go/payment --go_opt=paths=source_relative \
                 --go-grpc_out=./gen/go/payment --go-grpc_opt=paths=source_relative \
                 payment.proto

      - name: Push to Generated Repo
        env:
          GH_TOKEN: ${{ secrets.PROTO_GEN_TOKEN }}
        run: |
          cd gen/go
          git init
          git checkout -b main 
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/gTurboflex/assignment2-generated.git
          git add .
          git commit -m "Auto-generated gRPC code"
          # Теперь отправка точно сработает
          git push -f origin main